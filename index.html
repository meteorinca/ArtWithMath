<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>spiral rotation · external pattern</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: fit-content;
      max-width: 95vw;
    }

    .canvas-wrapper {
      background: #0a0a14;
      border-radius: 2.5rem;
      padding: 0.8rem;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2rem;
      background: #0f0f1a;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      color: #e0ddf5;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .label-row span:first-child {
      font-size: 0.95rem;
      text-transform: uppercase;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .value-badge {
      background: rgba(255, 255, 255, 0.12);
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      color: #ffdb8e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #5f5fd0, #8a8ae0, #bdb2ff);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(130, 130, 255, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px #b8a9ff, 0 4px 12px black;
      border: 2px solid #ffffffdd;
      transition: 0.15s;
      cursor: pointer;
      margin-top: -7px;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #fafaff;
    }

    .speed-slider {
      background: linear-gradient(to right, #2a2a50, #5a5aaf, #b8b8ff);
    }

    .note {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.5rem;
      border-radius: 2.5rem;
      color: white;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      align-self: center;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(170, 160, 255, 0.6);
    }

    #reloadBtn {
      margin-left: 0.5rem;
      background: rgba(180, 130, 255, 0.15);
      border-color: rgba(200, 160, 255, 0.4);
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
        gap: 1.4rem;
      }
      .button-group {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="spiralCanvas" aria-label="Rotating hypnotic spiral pattern"></canvas>
    </div>

    <div class="control-panel">
      <div class="slider-group">
        <div class="label-row">
          <span>🌀 Rotation angle</span>
          <span class="value-badge" id="angleDisplay">0.0°</span>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.1" aria-label="Rotation angle in degrees">
        <div class="note">manual rotate · overrides speed when moved</div>
      </div>

      <div class="slider-group">
        <div class="label-row">
          <span>⚡ Rotation speed</span>
          <span class="value-badge" id="speedDisplay">0.60x</span>
        </div>
        <input type="range" id="speedSlider" min="0" max="3" value="0.6" step="0.01" class="speed-slider" aria-label="Rotation speed multiplier">
        <div class="note">0 = stopped · leftmost · drag right for faster</div>
      </div>

      <div class="button-group">
        <button id="resetButton">
          <span>↺</span> Reset angle
        </button>
        <button id="reloadBtn" title="Reload pattern.js">
          <span>🔄</span> Reload pattern
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script id="pattern-script" src="pattern.js"></script>
  
  <script>
    (function() {
      // DOM elements
      const canvas = document.getElementById('spiralCanvas');
      const ctx = canvas.getContext('2d');
      const angleSlider = document.getElementById('angleSlider');
      const speedSlider = document.getElementById('speedSlider');
      const angleDisplay = document.getElementById('angleDisplay');
      const speedDisplay = document.getElementById('speedDisplay');
      const resetBtn = document.getElementById('resetButton');
      const reloadBtn = document.getElementById('reloadBtn');

      // State
      let spiralPatternCanvas = null;
      let patternReady = false;
      let currentAngle = 0.0;
      let rotationSpeed = 0.6;
      let animationFrameId = null;
      let lastTimestamp = 0;
      
      const DISPLAY_SIZE = 520;
      const DEGREES_PER_SECOND = 90.0;

      // Generate pattern using p5.js
      async function generateSpiralPattern() {
        if (typeof window.patternDraw !== 'function') {
          throw new Error('patternDraw function not found');
        }

        const container = document.createElement('div');
        container.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
        document.body.appendChild(container);

        return new Promise((resolve, reject) => {
          const sketch = (p) => {
            p.setup = () => {
              p.createCanvas(DISPLAY_SIZE, DISPLAY_SIZE);
              p.noLoop();
              
              if (typeof window.patternSetup === 'function') {
                window.patternSetup.call(p);
              }
              
              p.draw();
              
              // Capture immediately after draw
              requestAnimationFrame(() => {
                try {
                  const offCanvas = document.createElement('canvas');
                  offCanvas.width = DISPLAY_SIZE;
                  offCanvas.height = DISPLAY_SIZE;
                  const offCtx = offCanvas.getContext('2d');
                  offCtx.drawImage(p.canvas, 0, 0);
                  
                  p.remove();
                  document.body.removeChild(container);
                  resolve(offCanvas);
                } catch (e) {
                  p.remove();
                  document.body.removeChild(container);
                  reject(e);
                }
              });
            };

            p.draw = () => {
              if (typeof window.patternDraw === 'function') {
                window.patternDraw.call(p);
              }
            };
          };

          new p5(sketch, container);
        });
      }

      // Draw rotated pattern
      function drawRotatedSpiral() {
        if (!patternReady || !spiralPatternCanvas) {
          ctx.fillStyle = '#0f0f1a';
          ctx.fillRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
          ctx.fillStyle = '#aaa';
          ctx.font = '14px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('Loading pattern...', DISPLAY_SIZE/2, DISPLAY_SIZE/2);
          return;
        }

        ctx.clearRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
        ctx.fillStyle = '#0f0f1a';
        ctx.fillRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);

        const centerX = DISPLAY_SIZE / 2;
        const centerY = DISPLAY_SIZE / 2;
        const angleRad = (currentAngle * Math.PI) / 180;

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angleRad);
        ctx.drawImage(
          spiralPatternCanvas, 
          -centerX, -centerY, 
          DISPLAY_SIZE, DISPLAY_SIZE
        );
        ctx.restore();
      }

      // Animation loop
      function animationLoop(timestamp) {
        if (lastTimestamp === 0) {
          lastTimestamp = timestamp;
          animationFrameId = requestAnimationFrame(animationLoop);
          drawRotatedSpiral();
          return;
        }

        const deltaTime = Math.min(0.1, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;

        if (rotationSpeed > 0.001) {
          currentAngle += rotationSpeed * DEGREES_PER_SECOND * deltaTime;
          currentAngle = ((currentAngle % 360) + 360) % 360;
          
          // Update UI
          angleSlider.value = currentAngle;
          angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        }

        drawRotatedSpiral();
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      // Setup canvas and pattern
      async function setupCanvasAndPattern() {
        canvas.width = DISPLAY_SIZE;
        canvas.height = DISPLAY_SIZE;

        try {
          spiralPatternCanvas = await generateSpiralPattern();
          patternReady = true;
          drawRotatedSpiral();
        } catch (error) {
          console.error('Failed to generate pattern:', error);
          patternReady = false;
          ctx.fillStyle = '#0f0f1a';
          ctx.fillRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
          ctx.fillStyle = '#ff8888';
          ctx.font = '14px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('⚠️ Error loading pattern', DISPLAY_SIZE/2, DISPLAY_SIZE/2 - 10);
          ctx.fillText(error.message, DISPLAY_SIZE/2, DISPLAY_SIZE/2 + 20);
        }
      }

      // Reload pattern
      async function reloadPattern() {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        patternReady = false;
        spiralPatternCanvas = null;

        const oldScript = document.getElementById('pattern-script');
        if (oldScript) oldScript.remove();

        const newScript = document.createElement('script');
        newScript.id = 'pattern-script';
        newScript.src = `pattern.js?v=${Date.now()}`;

        try {
          await new Promise((resolve, reject) => {
            newScript.onload = resolve;
            newScript.onerror = () => reject(new Error('Failed to load pattern.js'));
            document.head.appendChild(newScript);
          });

          await setupCanvasAndPattern();
          
          lastTimestamp = performance.now();
          animationFrameId = requestAnimationFrame(animationLoop);

          reloadBtn.style.background = 'rgba(150, 255, 150, 0.3)';
          setTimeout(() => {
            reloadBtn.style.background = 'rgba(180, 130, 255, 0.15)';
          }, 300);
        } catch (error) {
          console.error('Reload failed:', error);
        }
      }

      // UI handlers
      function updateAngleFromSlider() {
        currentAngle = parseFloat(angleSlider.value) || 0;
        angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        drawRotatedSpiral();
      }

      function updateSpeedFromSlider() {
        rotationSpeed = parseFloat(speedSlider.value) || 0;
        speedDisplay.textContent = rotationSpeed.toFixed(2) + 'x';
      }

      function resetAngle() {
        currentAngle = 0.0;
        angleSlider.value = 0.0;
        angleDisplay.textContent = '0.0°';
        drawRotatedSpiral();
      }

      // Event listeners
      angleSlider.addEventListener('input', () => {
        rotationSpeed = 0;
        speedSlider.value = 0;
        speedDisplay.textContent = '0.00x';
        updateAngleFromSlider();
      });

      speedSlider.addEventListener('input', updateSpeedFromSlider);
      resetBtn.addEventListener('click', resetAngle);
      reloadBtn.addEventListener('click', reloadPattern);

      // Initialize
      async function init() {
        canvas.width = DISPLAY_SIZE;
        canvas.height = DISPLAY_SIZE;
        
        angleDisplay.textContent = '0.0°';
        speedDisplay.textContent = '0.60x';
        
        await setupCanvasAndPattern();
        
        if (!animationFrameId) {
          lastTimestamp = performance.now();
          animationFrameId = requestAnimationFrame(animationLoop);
        }
      }

      // Start when dependencies are ready
      function checkDependencies() {
        if (typeof p5 !== 'undefined' && typeof window.patternDraw !== 'undefined') {
          init();
        } else {
          setTimeout(checkDependencies, 50);
        }
      }

      checkDependencies();

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
      });
    })();
  </script>
</body>
</html>
