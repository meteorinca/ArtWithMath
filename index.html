
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spiral Pattern Renderer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Fira Sans', sans-serif;
        }

        /* full-screen canvas container: flexible, preserves square aspect ratio, but fills viewport nicely */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
        }

        canvas {
            display: block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            /* maintain crisp edges */
            width: auto;
            height: auto;
            max-width: 98vmin;
            max-height: 98vmin;
            width: min(98vmin, 100%);
            height: min(98vmin, 100%);
            object-fit: contain;
        }

        /* subtle info overlay (optional) */
        .info {
            position: fixed;
            bottom: 12px;
            left: 12px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }
    </style>
    <!-- p5.js core library (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<div class="canvas-wrapper">
    <div id="p5canvas-container"></div>
</div>
<div class="info">spiral | generative pattern | sample.js</div>

<script>
    (function() {
        // ensure container exists
        const container = document.getElementById('p5canvas-container');
        if (!container) {
            console.warn('container missing, recreate');
        }

        // Utility: move p5 canvas to our container after it's created
        function relocateCanvasToContainer() {
            const canvases = document.querySelectorAll('canvas');
            if (canvases.length === 0) {
                // not yet created, retry
                setTimeout(relocateCanvasToContainer, 50);
                return;
            }
            const canvasElem = canvases[0]; // p5 typically creates one main canvas
            if (canvasElem && container && !container.contains(canvasElem)) {
                // if canvas is not already inside container, move it.
                // But also ensure we preserve styles, and fix any resize issues.
                // clear container any previous children? container might have something else.
                // but basically we want to attach.
                container.innerHTML = ''; // clear any placeholder
                container.appendChild(canvasElem);
                // re-apply display properties to canvas (CSS already handles)
                canvasElem.style.display = 'block';
                canvasElem.style.margin = '0 auto';
                console.log('Canvas relocated to custom container for perfect centering.');
            }
        }

        // Function to load sample.js and handle errors
        function loadSampleScript() {
            const scriptTag = document.createElement('script');
            scriptTag.src = './sample.js';
            scriptTag.type = 'text/javascript';
            scriptTag.onload = function() {
                console.log('✓ sample.js loaded successfully. Spiral pattern active.');
                // Since p5 will call setup/draw after script parsed, we watch canvas.
                // Wait a tick for setup to potentially create canvas.
                setTimeout(relocateCanvasToContainer, 100);
                // Also observe in case canvas appears later dynamically? p5 creates canvas synchronously in setup.
                // So 100ms is safe.
            };
            scriptTag.onerror = function() {
                console.error('✗ Failed to load sample.js. Make sure the file exists in the same directory as this HTML file.');
                // Show fallback message inside container
                if (container) {
                    container.innerHTML = '<div style="color:#aaa; text-align:center; padding:2rem; background:#1e1e1e; border-radius:1rem;">⚠️ sample.js not found.<br>Please place a valid sample.js in the same folder.</div>';
                }
            };
            document.head.appendChild(scriptTag);
        }

        // Wait until p5 is fully loaded before injecting sample script?
        // Since p5 is already included in head above (synchronous CDN), 
        // we can safely load sample.js after DOM ready.
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                loadSampleScript();
            });
        } else {
            loadSampleScript();
        }

        // Also add a resize listener? Not needed for now, but just ensure that canvas position
        // remains centered if window resizes: because canvas is inside container with flex.
        // However if the canvas size is fixed 900px, it's fine.
        // additionally, to be robust: catch any case where p5 is not ready or redefine?
        // but no need.
    })();

    // Additional guarantee for canvas moving if it appears after a long delay? Already covered.
    // Also we add small style to make the container fully centered and background dark.
    // Pure plus: provide simple status message if loading
</script>

<!-- Additional style to ensure canvas is scalable and fullscreen behavior -->
<style>
    /* Override any default canvas margins and ensure no overflow */
    body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        background: #0a0a0a;
    }
    .canvas-wrapper {
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    #p5canvas-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
    }
    canvas {
        box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 8px 20px rgba(0,0,0,0.6);
        border-radius: 8px;
        transition: all 0.2s ease;
        max-width: 95vmin;
        max-height: 95vmin;
        width: auto;
        height: auto;
    }
    /* for extremely small screens keep it readable */
    @media (max-width: 600px) {
        canvas {
            max-width: 98vmin;
            max-height: 98vmin;
        }
    }
    .info {
        font-family: monospace;
        backdrop-filter: blur(4px);
        background: rgba(0,0,0,0.5);
        border-radius: 24px;
        font-size: 12px;
        padding: 5px 12px;
        pointer-events: none;
        z-index: 100;
    }
</style>

</body>
</html>
