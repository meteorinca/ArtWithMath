<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>spiral rotation · external pattern</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: fit-content;
      max-width: 95vw;
    }

    .canvas-wrapper {
      background: #0a0a14;
      border-radius: 2.5rem;
      padding: 0.8rem;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2rem;
      background: #0f0f1a;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      color: #e0ddf5;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .label-row span:first-child {
      font-size: 0.95rem;
      text-transform: uppercase;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .value-badge {
      background: rgba(255, 255, 255, 0.12);
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      color: #ffdb8e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #5f5fd0, #8a8ae0, #bdb2ff);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(130, 130, 255, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px #b8a9ff, 0 4px 12px black;
      border: 2px solid #ffffffdd;
      transition: 0.15s;
      cursor: pointer;
      margin-top: -7px;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #fafaff;
    }

    .speed-slider {
      background: linear-gradient(to right, #2a2a50, #5a5aaf, #b8b8ff);
    }

    .note {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.5rem;
      border-radius: 2.5rem;
      color: white;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      align-self: center;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(170, 160, 255, 0.6);
    }

    #reloadBtn {
      margin-left: 0.5rem;
      background: rgba(180, 130, 255, 0.15);
      border-color: rgba(200, 160, 255, 0.4);
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
        gap: 1.4rem;
      }
      .button-group {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="spiralCanvas" aria-label="Rotating hypnotic spiral pattern"></canvas>
    </div>

    <div class="control-panel">
      <!-- Rotation angle slider -->
      <div class="slider-group">
        <div class="label-row">
          <span>🌀 Rotation angle</span>
          <span class="value-badge" id="angleDisplay">0.0°</span>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.1" aria-label="Rotation angle in degrees">
        <div class="note">manual rotate · overrides speed when moved</div>
      </div>

      <!-- Speed slider (0 = stopped, left is 0) -->
      <div class="slider-group">
        <div class="label-row">
          <span>⚡ Rotation speed</span>
          <span class="value-badge" id="speedDisplay">0.60x</span>
        </div>
        <input type="range" id="speedSlider" min="0" max="3" value="0.6" step="0.01" class="speed-slider" aria-label="Rotation speed multiplier">
        <div class="note">0 = stopped · leftmost · drag right for faster</div>
      </div>

      <div class="button-group">
        <button id="resetButton">
          <span>↺</span> Reset angle
        </button>
        <button id="reloadBtn" title="Reload pattern.js">
          <span>🔄</span> Reload pattern
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- DOM elements -----
      const canvas = document.getElementById('spiralCanvas');
      const ctx = canvas.getContext('2d');

      const angleSlider = document.getElementById('angleSlider');
      const speedSlider = document.getElementById('speedSlider');
      const angleDisplay = document.getElementById('angleDisplay');
      const speedDisplay = document.getElementById('speedDisplay');
      const resetBtn = document.getElementById('resetButton');
      const reloadBtn = document.getElementById('reloadBtn');

      // ----- Offscreen canvas for the static spiral pattern -----
      let spiralPatternCanvas = null;
      let patternReady = false;

      // ----- Rotation state -----
      let currentAngle = 0.0;
      let rotationSpeed = 0.6;

      // Animation
      let animationFrameId = null;
      let lastTimestamp = 0;

      const DISPLAY_SIZE = 520;

      // ========== Function to generate pattern from external code ==========
      // This creates a temporary p5.js instance to render the pattern,
      // then captures the result to our offscreen canvas.
      function generateSpiralPattern() {
        return new Promise((resolve, reject) => {
          // Check if pattern code is loaded
          if (typeof window.patternDraw !== 'function') {
            reject(new Error('patternDraw function not found. Make sure pattern.js is loaded.'));
            return;
          }

          // Create a temporary container for p5
          const tempContainer = document.createElement('div');
          tempContainer.style.position = 'absolute';
          tempContainer.style.left = '-9999px';
          tempContainer.style.top = '-9999px';
          tempContainer.style.width = '900px';
          tempContainer.style.height = '900px';
          document.body.appendChild(tempContainer);

          // Create p5 instance using the external pattern code
          const sketch = function(p) {
            // Override setup and draw to use our version that captures the canvas
            p.setup = function() {
              p.createCanvas(900, 900);
              p.noLoop();
              
              // Call the external setup if it exists
              if (typeof window.patternSetup === 'function') {
                window.patternSetup.call(p);
              }
              
              // Draw the pattern
              p.draw();
              
              // Capture the canvas content after drawing
              setTimeout(() => {
                try {
                  const offCanvas = document.createElement('canvas');
                  offCanvas.width = 900;
                  offCanvas.height = 900;
                  const offCtx = offCanvas.getContext('2d');
                  offCtx.drawImage(p.canvas, 0, 0);
                  
                  // Clean up
                  p.remove();
                  document.body.removeChild(tempContainer);
                  
                  resolve(offCanvas);
                } catch (e) {
                  reject(e);
                }
              }, 50); // Small delay to ensure drawing is complete
            };

            p.draw = function() {
              // Call the external draw function if it exists
              if (typeof window.patternDraw === 'function') {
                window.patternDraw.call(p);
              }
            };
          };

          try {
            new p5(sketch, tempContainer);
          } catch (e) {
            document.body.removeChild(tempContainer);
            reject(e);
          }
        });
      }

      // ========== Fallback: generate pattern directly from extracted code ==========
      // In case you want to bypass p5.js for performance, 
      // but we'll use p5.js to stay true to the original code.
      
      // ========== Initialize canvas and generate pattern ==========
      async function setupCanvasAndPattern() {
        canvas.width = DISPLAY_SIZE;
        canvas.height = DISPLAY_SIZE;

        try {
          spiralPatternCanvas = await generateSpiralPattern();
          patternReady = true;
          drawRotatedSpiral();
        } catch (error) {
          console.error('Failed to generate pattern:', error);
          // Draw error message on canvas
          ctx.fillStyle = '#141414';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#ff8888';
          ctx.font = '14px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('⚠️ Error loading pattern', canvas.width/2, canvas.height/2 - 10);
          ctx.fillText(error.message, canvas.width/2, canvas.height/2 + 20);
        }
      }

      // ========== Reload pattern ==========
      async function reloadPattern() {
        // Cancel current animation
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        patternReady = false;
        spiralPatternCanvas = null;

        // Clear cache busting - add timestamp to force reload
        const scriptId = 'pattern-script';
        const oldScript = document.getElementById(scriptId);
        if (oldScript) {
          oldScript.remove();
        }

        // Reload the script with cache busting
        const newScript = document.createElement('script');
        newScript.id = scriptId;
        newScript.src = `pattern.js?v=${Date.now()}`;
        
        // Remove old global functions
        delete window.patternSetup;
        delete window.patternDraw;

        // Load the new script
        await new Promise((resolve, reject) => {
          newScript.onload = resolve;
          newScript.onerror = () => reject(new Error('Failed to load pattern.js'));
          document.head.appendChild(newScript);
        });

        // Re-generate pattern
        await setupCanvasAndPattern();

        // Restart animation
        lastTimestamp = performance.now();
        animationFrameId = requestAnimationFrame(animationLoop);

        // Visual feedback
        reloadBtn.style.background = 'rgba(150, 255, 150, 0.3)';
        setTimeout(() => {
          reloadBtn.style.background = 'rgba(180, 130, 255, 0.15)';
        }, 300);
      }

      // ========== Draw rotated spiral ==========
      function drawRotatedSpiral() {
        if (!canvas || !ctx || !patternReady || !spiralPatternCanvas) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#141414';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#aaa';
          ctx.font = '14px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('generating spiral...', canvas.width/2, canvas.height/2);
          return;
        }

        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#141414';
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(centerX, centerY);
        const angleRad = (currentAngle * Math.PI) / 180;
        ctx.rotate(angleRad);
        ctx.drawImage(spiralPatternCanvas, -w/2, -h/2, w, h);
        ctx.restore();
      }

      // ========== Animation loop ==========
      function animationLoop(timestamp) {
        if (lastTimestamp === 0) {
          lastTimestamp = timestamp;
          animationFrameId = requestAnimationFrame(animationLoop);
          drawRotatedSpiral();
          return;
        }

        const deltaTime = Math.min(0.1, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;

        const DEGREES_PER_SECOND_AT_SPEED_1 = 90.0;
        if (rotationSpeed > 0.001) {
          currentAngle += rotationSpeed * DEGREES_PER_SECOND_AT_SPEED_1 * deltaTime;
          currentAngle = currentAngle % 360;
          if (currentAngle < 0) currentAngle += 360;

          angleSlider.value = currentAngle;
          angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        }

        drawRotatedSpiral();
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      // ========== UI handlers ==========
      function updateAngleFromSlider() {
        const newAngle = parseFloat(angleSlider.value);
        if (isNaN(newAngle)) return;
        currentAngle = newAngle;
        angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        if (Math.abs(rotationSpeed) < 0.001) {
          drawRotatedSpiral();
        }
      }

      function updateSpeedFromSlider() {
        const newSpeed = parseFloat(speedSlider.value);
        if (isNaN(newSpeed)) return;
        rotationSpeed = newSpeed;
        speedDisplay.textContent = rotationSpeed.toFixed(2) + 'x';
      }

      function resetAngle() {
        currentAngle = 0.0;
        angleSlider.value = 0.0;
        angleDisplay.textContent = '0.0°';
        if (Math.abs(rotationSpeed) < 0.001) {
          drawRotatedSpiral();
        }
      }

      // ========== Event listeners ==========
      angleSlider.addEventListener('input', () => {
        if (rotationSpeed > 0.001) {
          rotationSpeed = 0.0;
          speedSlider.value = 0.0;
          speedDisplay.textContent = '0.00x';
        }
        updateAngleFromSlider();
      });

      speedSlider.addEventListener('input', updateSpeedFromSlider);
      resetBtn.addEventListener('click', resetAngle);
      reloadBtn.addEventListener('click', reloadPattern);

      // ========== Initialization ==========
      function initializeDisplays() {
        angleDisplay.textContent = parseFloat(angleSlider.value).toFixed(1) + '°';
        speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(2) + 'x';
        rotationSpeed = parseFloat(speedSlider.value);
        currentAngle = parseFloat(angleSlider.value);
      }

      async function init() {
        initializeDisplays();
        await setupCanvasAndPattern();

        if (animationFrameId === null) {
          lastTimestamp = performance.now();
          animationFrameId = requestAnimationFrame(animationLoop);
        }
      }

      // Wait for p5.js and pattern.js to load before initializing
      function waitForDependencies() {
        return new Promise((resolve) => {
          const checkInterval = setInterval(() => {
            if (typeof p5 !== 'undefined' && typeof window.patternDraw !== 'undefined') {
              clearInterval(checkInterval);
              resolve();
            }
          }, 100);
        });
      }

      waitForDependencies().then(() => {
        init();
      }).catch((err) => {
        console.error('Failed to load dependencies:', err);
      });

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      });

    })();
  </script>

  <!-- Load p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <!-- Load external pattern file -->
  <script id="pattern-script" src="pattern.js"></script>
</body>
</html>
