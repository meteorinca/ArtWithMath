
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>spiral rotation · speed control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: fit-content;
      max-width: 95vw;
    }

    .canvas-wrapper {
      background: #0a0a14;
      border-radius: 2.5rem;
      padding: 0.8rem;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2rem;
      background: #0f0f1a;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      color: #e0ddf5;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .label-row span:first-child {
      font-size: 0.95rem;
      text-transform: uppercase;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .value-badge {
      background: rgba(255, 255, 255, 0.12);
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      color: #ffdb8e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #5f5fd0, #8a8ae0, #bdb2ff);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(130, 130, 255, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px #b8a9ff, 0 4px 12px black;
      border: 2px solid #ffffffdd;
      transition: 0.15s;
      cursor: pointer;
      margin-top: -7px;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #fafaff;
    }

    .speed-slider {
      background: linear-gradient(to right, #2a2a50, #5a5aaf, #b8b8ff);
    }

    .note {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.5rem;
      border-radius: 2.5rem;
      color: white;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      align-self: center;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(170, 160, 255, 0.6);
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
        gap: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="spiralCanvas" aria-label="Rotating hypnotic spiral pattern"></canvas>
    </div>

    <div class="control-panel">
      <!-- Rotation angle slider -->
      <div class="slider-group">
        <div class="label-row">
          <span>🌀 Rotation angle</span>
          <span class="value-badge" id="angleDisplay">0.0°</span>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.1" aria-label="Rotation angle in degrees">
        <div class="note">manual rotate · overrides speed when moved</div>
      </div>

      <!-- Speed slider (0 = stopped, left is 0) -->
      <div class="slider-group">
        <div class="label-row">
          <span>⚡ Rotation speed</span>
          <span class="value-badge" id="speedDisplay">0.60x</span>
        </div>
        <input type="range" id="speedSlider" min="0" max="3" value="0.6" step="0.01" class="speed-slider" aria-label="Rotation speed multiplier">
        <div class="note">0 = stopped · leftmost · drag right for faster</div>
      </div>

      <button id="resetButton">
        <span>↺</span> Reset angle (0°)
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ----- DOM elements -----
      const canvas = document.getElementById('spiralCanvas');
      const ctx = canvas.getContext('2d');

      const angleSlider = document.getElementById('angleSlider');
      const speedSlider = document.getElementById('speedSlider');
      const angleDisplay = document.getElementById('angleDisplay');
      const speedDisplay = document.getElementById('speedDisplay');
      const resetBtn = document.getElementById('resetButton');

      // ----- Offscreen canvas for the static spiral pattern -----
      // We'll render the spiral once into an offscreen canvas, then draw it rotated.
      let spiralPatternCanvas = null;
      let patternReady = false;

      // ----- Rotation state -----
      let currentAngle = 0.0;          // degrees
      let rotationSpeed = 0.6;        // default speed

      // Animation
      let animationFrameId = null;
      let lastTimestamp = 0;

      // Canvas display size (the visible canvas size)
      const DISPLAY_SIZE = 520;       // matches original 900 but scaled down nicely

      // ----- Generate the spiral pattern (once) onto an offscreen canvas -----
      function generateSpiralPattern() {
        // Use a high-resolution offscreen canvas for the pattern (900x900 as original)
        const size = 900;
        const offCanvas = document.createElement('canvas');
        offCanvas.width = size;
        offCanvas.height = size;
        const offCtx = offCanvas.getContext('2d');

        // --- exactly the p5.js spiral code adapted to raw canvas ---
        const width = size;
        const height = size;
        const centerX = width / 2;
        const centerY = height / 2;
        const R = 405;

        // background
        offCtx.fillStyle = '#141414';  // close to background(20) in p5 (20 is ~ #141414)
        offCtx.fillRect(0, 0, width, height);

        // translate to center
        offCtx.save();
        offCtx.translate(centerX, centerY);

        // outer circle
        offCtx.beginPath();
        offCtx.arc(0, 0, R, 0, Math.PI * 2);
        offCtx.strokeStyle = '#ffffff';
        offCtx.lineWidth = 1.2;
        offCtx.stroke();

        // clip to circle interior
        offCtx.save();
        offCtx.beginPath();
        offCtx.arc(0, 0, R - 1.5, 0, Math.PI * 2);
        offCtx.clip();

        // dot drawing settings
        offCtx.fillStyle = '#ffffff';

        // main controls (same as original)
        const K = 89;
        const r0 = 0.0082;
        const growth = 0.048;
        const ringTwist = 0.141;
        const tight = 11.2;
        const phase0 = 0.65;
        const arms = 2;

        for (let j = 0; ; j++) {
          const nr = r0 * Math.exp(growth * j);
          if (nr > 0.995) break;

          const r = nr * R;

          for (let k = 0; k < K; k++) {
            const theta = (Math.PI * 2 * k) / K + j * ringTwist;

            // two-arm log-spiral phase
            const p = arms * theta + tight * Math.log(nr) + phase0;

            // arm intensity
            const wave = 0.5 + 0.5 * Math.cos(p);

            // sharpness
            const sharp = 3.8 + 3.5 * (1.0 - nr * nr);
            const band = Math.pow(wave, sharp);

            // dot sizes
            const baseSize = 0.25 + 4.2 * Math.pow(nr, 0.85);
            const armBoost = 22.0 * Math.pow(nr, 1.15) * band;

            // beading effect
            const beadPulse = 0.75 + 0.25 * Math.pow(Math.abs(Math.cos(p * 1.3 + nr * 12.0)), 1.5);

            const d = (baseSize + armBoost) * (0.85 + 0.15 * beadPulse);

            const x = r * Math.cos(theta);
            const y = r * Math.sin(theta);

            // keep dot inside border
            if (r + d * 0.52 > R - 1.5) continue;

            // draw ellipse (dot)
            offCtx.beginPath();
            offCtx.ellipse(x, y, d / 2, d / 2, 0, 0, Math.PI * 2);
            offCtx.fill();
          }
        }

        // restore clip
        offCtx.restore();

        // redraw circle border on top
        offCtx.beginPath();
        offCtx.arc(0, 0, R, 0, Math.PI * 2);
        offCtx.strokeStyle = '#ffffff';
        offCtx.lineWidth = 1.2;
        offCtx.stroke();

        offCtx.restore(); // restore translation

        return offCanvas;
      }

      // ----- Initialize canvas size and generate pattern -----
      function setupCanvasAndPattern() {
        canvas.width = DISPLAY_SIZE;
        canvas.height = DISPLAY_SIZE;

        // Generate spiral pattern once (it's expensive, so we cache it)
        if (!spiralPatternCanvas) {
          spiralPatternCanvas = generateSpiralPattern();
          patternReady = true;
        }
      }

      // ----- Draw the rotated spiral onto the visible canvas -----
      function drawRotatedSpiral() {
        if (!canvas || !ctx || !patternReady || !spiralPatternCanvas) {
          // fallback drawing
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#141414';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#aaa';
          ctx.font = '14px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('generating spiral...', canvas.width/2, canvas.height/2);
          return;
        }

        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;

        ctx.clearRect(0, 0, w, h);
        
        // Draw background matching spiral background
        ctx.fillStyle = '#141414';
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(centerX, centerY);

        // Convert angle to radians
        const angleRad = (currentAngle * Math.PI) / 180;
        ctx.rotate(angleRad);

        // Draw the offscreen spiral pattern centered.
        // The offscreen canvas is 900x900, we scale it to fit DISPLAY_SIZE.
        const scale = DISPLAY_SIZE / 900;
        ctx.drawImage(
          spiralPatternCanvas,
          -DISPLAY_SIZE / 2,
          -DISPLAY_SIZE / 2,
          DISPLAY_SIZE,
          DISPLAY_SIZE
        );
        // Note: drawImage with destination width/height already scales.
        // Actually we can just use the scaled dimensions directly.
        // Simpler: 
        // ctx.drawImage(spiralPatternCanvas, -w/2, -h/2, w, h);
        
        ctx.restore();

        // The above works but careful: we already set translate and rotate.
        // Let's refine the drawImage call to be precise.
        // We'll redo the drawing part for clarity:
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#141414';
        ctx.fillRect(0, 0, w, h);
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angleRad);
        ctx.drawImage(spiralPatternCanvas, -w/2, -h/2, w, h);
        ctx.restore();
      }

      // ----- Animation loop -----
      function animationLoop(timestamp) {
        if (lastTimestamp === 0) {
          lastTimestamp = timestamp;
          animationFrameId = requestAnimationFrame(animationLoop);
          drawRotatedSpiral();
          return;
        }

        const deltaTime = Math.min(0.1, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;

        // Update angle based on speed (degrees per second)
        const DEGREES_PER_SECOND_AT_SPEED_1 = 90.0;
        if (rotationSpeed > 0.001) {
          currentAngle += rotationSpeed * DEGREES_PER_SECOND_AT_SPEED_1 * deltaTime;
          currentAngle = currentAngle % 360;
          if (currentAngle < 0) currentAngle += 360;

          // Update slider and display to reflect continuous rotation
          angleSlider.value = currentAngle;
          angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        }

        drawRotatedSpiral();

        animationFrameId = requestAnimationFrame(animationLoop);
      }

      // ----- UI handlers -----
      function updateAngleFromSlider() {
        const newAngle = parseFloat(angleSlider.value);
        if (isNaN(newAngle)) return;
        currentAngle = newAngle;
        angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        // Immediate draw when speed is zero (manual control)
        if (Math.abs(rotationSpeed) < 0.001) {
          drawRotatedSpiral();
        }
      }

      function updateSpeedFromSlider() {
        const newSpeed = parseFloat(speedSlider.value);
        if (isNaN(newSpeed)) return;
        rotationSpeed = newSpeed;
        speedDisplay.textContent = rotationSpeed.toFixed(2) + 'x';
      }

      function resetAngle() {
        currentAngle = 0.0;
        angleSlider.value = 0.0;
        angleDisplay.textContent = '0.0°';
        if (Math.abs(rotationSpeed) < 0.001) {
          drawRotatedSpiral();
        }
      }

      // ----- Event listeners with manual-angle-stops-rotation behavior -----
      angleSlider.addEventListener('input', () => {
        // When user manually adjusts angle, stop automatic rotation for precise control
        if (rotationSpeed > 0.001) {
          rotationSpeed = 0.0;
          speedSlider.value = 0.0;
          speedDisplay.textContent = '0.00x';
        }
        updateAngleFromSlider();
      });

      speedSlider.addEventListener('input', updateSpeedFromSlider);

      resetBtn.addEventListener('click', resetAngle);

      // ----- Initialization -----
      function initializeDisplays() {
        angleDisplay.textContent = parseFloat(angleSlider.value).toFixed(1) + '°';
        speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(2) + 'x';
        rotationSpeed = parseFloat(speedSlider.value);
        currentAngle = parseFloat(angleSlider.value);
      }

      // Start everything
      initializeDisplays();
      setupCanvasAndPattern();

      // Small delay to ensure pattern is generated before first draw
      if (patternReady) {
        drawRotatedSpiral();
      } else {
        // If pattern not ready yet (should be immediate), wait a tick
        setTimeout(() => {
          if (!patternReady) {
            spiralPatternCanvas = generateSpiralPattern();
            patternReady = true;
          }
          drawRotatedSpiral();
          if (animationFrameId === null) {
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(animationLoop);
          }
        }, 10);
      }

      // Start animation loop
      if (animationFrameId === null) {
        lastTimestamp = performance.now();
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      });

    })();
  </script>
</body>
</html>
