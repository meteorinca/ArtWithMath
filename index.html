<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>spiral rotation · external pattern</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: fit-content;
      max-width: 95vw;
    }

    .canvas-wrapper {
      background: #0a0a14;
      border-radius: 2.5rem;
      padding: 0.8rem;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 20px 35px rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2rem;
      background: #0f0f1a;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      color: #e0ddf5;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .label-row span:first-child {
      font-size: 0.95rem;
      text-transform: uppercase;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .value-badge {
      background: rgba(255, 255, 255, 0.12);
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      color: #ffdb8e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #5f5fd0, #8a8ae0, #bdb2ff);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(130, 130, 255, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 20px #b8a9ff, 0 4px 12px black;
      border: 2px solid #ffffffdd;
      transition: 0.15s;
      cursor: pointer;
      margin-top: -7px;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #fafaff;
    }

    .speed-slider {
      background: linear-gradient(to right, #2a2a50, #5a5aaf, #b8b8ff);
    }

    .note {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.5rem;
      border-radius: 2.5rem;
      color: white;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      align-self: center;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(170, 160, 255, 0.6);
    }

    #reloadBtn {
      margin-left: 0.5rem;
      background: rgba(180, 130, 255, 0.15);
      border-color: rgba(200, 160, 255, 0.4);
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
        gap: 1.4rem;
      }
      .button-group {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="spiralCanvas" width="520" height="520" aria-label="Rotating hypnotic spiral pattern"></canvas>
    </div>

    <div class="control-panel">
      <div class="slider-group">
        <div class="label-row">
          <span>🌀 Rotation angle</span>
          <span class="value-badge" id="angleDisplay">0.0°</span>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.1" aria-label="Rotation angle in degrees">
        <div class="note">manual rotate · overrides speed when moved</div>
      </div>

      <div class="slider-group">
        <div class="label-row">
          <span>⚡ Rotation speed</span>
          <span class="value-badge" id="speedDisplay">0.60x</span>
        </div>
        <input type="range" id="speedSlider" min="0" max="3" value="0.6" step="0.01" class="speed-slider" aria-label="Rotation speed multiplier">
        <div class="note">0 = stopped · leftmost · drag right for faster</div>
      </div>

      <div class="button-group">
        <button id="resetButton">
          <span>↺</span> Reset angle
        </button>
        <button id="reloadBtn" title="Reload pattern">
          <span>🔄</span> Reload pattern
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <script>
    (function() {
      // DOM elements
      const canvas = document.getElementById('spiralCanvas');
      const ctx = canvas.getContext('2d');
      const angleSlider = document.getElementById('angleSlider');
      const speedSlider = document.getElementById('speedSlider');
      const angleDisplay = document.getElementById('angleDisplay');
      const speedDisplay = document.getElementById('speedDisplay');
      const resetBtn = document.getElementById('resetButton');
      const reloadBtn = document.getElementById('reloadBtn');

      // State
      let patternCanvas = null;
      let patternReady = false;
      let currentAngle = 0;
      let rotationSpeed = 0.6;
      let animationId = null;
      let lastTime = 0;
      
      const SIZE = 520;

      // Generate the spiral pattern using p5.js
      function drawSpiralPattern() {
        return new Promise((resolve) => {
          const sketch = (p) => {
            p.setup = () => {
              p.createCanvas(SIZE, SIZE);
              p.noLoop();
              
              // Draw beautiful spiral pattern
              p.background(15, 15, 26);
              p.translate(SIZE/2, SIZE/2);
              
              // Draw multiple spiraling arms
              for (let arm = 0; arm < 12; arm++) {
                const armAngle = (arm / 12) * p.TWO_PI;
                
                p.strokeWeight(2);
                for (let i = 0; i < 360; i += 2) {
                  const angle = p.radians(i * 3) + armAngle;
                  const radius = i * 0.7;
                  const x = p.cos(angle) * radius;
                  const y = p.sin(angle) * radius;
                  
                  // Color gradient
                  const hue = (i / 2 + arm * 30) % 360;
                  p.stroke(hue, 80, 90);
                  
                  if (i > 0) {
                    p.line(prevX, prevY, x, y);
                  }
                  
                  var prevX = x;
                  var prevY = y;
                }
              }
              
              // Add some dots
              for (let i = 0; i < 200; i++) {
                const angle = p.random(p.TWO_PI);
                const radius = p.random(30, 250);
                const x = p.cos(angle) * radius;
                const y = p.sin(angle) * radius;
                const hue = p.random(360);
                p.fill(hue, 70, 90);
                p.noStroke();
                p.circle(x, y, p.random(2, 5));
              }
              
              // Capture the canvas
              const offCanvas = document.createElement('canvas');
              offCanvas.width = SIZE;
              offCanvas.height = SIZE;
              const offCtx = offCanvas.getContext('2d');
              offCtx.drawImage(p.canvas, 0, 0);
              
              p.remove();
              resolve(offCanvas);
            };
          };
          
          const container = document.createElement('div');
          container.style.display = 'none';
          document.body.appendChild(container);
          new p5(sketch, container);
          
          // Clean up container after a delay
          setTimeout(() => {
            if (container.parentNode) {
              document.body.removeChild(container);
            }
          }, 100);
        });
      }

      // Draw the rotated pattern on the main canvas
      function render() {
        ctx.clearRect(0, 0, SIZE, SIZE);
        ctx.fillStyle = '#0f0f1a';
        ctx.fillRect(0, 0, SIZE, SIZE);
        
        if (!patternReady || !patternCanvas) {
          ctx.fillStyle = '#ffffff';
          ctx.font = '16px "Segoe UI"';
          ctx.textAlign = 'center';
          ctx.fillText('Loading...', SIZE/2, SIZE/2);
          return;
        }
        
        ctx.save();
        ctx.translate(SIZE/2, SIZE/2);
        ctx.rotate(currentAngle * Math.PI / 180);
        ctx.drawImage(patternCanvas, -SIZE/2, -SIZE/2);
        ctx.restore();
      }

      // Animation loop
      function animate(timestamp) {
        if (!lastTime) lastTime = timestamp;
        
        const delta = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        
        // Apply rotation
        if (rotationSpeed > 0.001) {
          currentAngle += rotationSpeed * 90 * delta; // 90 degrees per second at speed 1
          currentAngle = currentAngle % 360;
          if (currentAngle < 0) currentAngle += 360;
          
          // Update slider and display
          angleSlider.value = currentAngle;
          angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        }
        
        render();
        animationId = requestAnimationFrame(animate);
      }

      // Event handlers
      angleSlider.addEventListener('input', () => {
        currentAngle = parseFloat(angleSlider.value);
        angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        rotationSpeed = 0;
        speedSlider.value = 0;
        speedDisplay.textContent = '0.00x';
        render();
      });

      speedSlider.addEventListener('input', () => {
        rotationSpeed = parseFloat(speedSlider.value);
        speedDisplay.textContent = rotationSpeed.toFixed(2) + 'x';
      });

      resetBtn.addEventListener('click', () => {
        currentAngle = 0;
        angleSlider.value = 0;
        angleDisplay.textContent = '0.0°';
        render();
      });

      reloadBtn.addEventListener('click', async () => {
        patternReady = false;
        reloadBtn.style.background = 'rgba(255, 255, 150, 0.3)';
        
        try {
          patternCanvas = await drawSpiralPattern();
          patternReady = true;
          render();
          reloadBtn.style.background = 'rgba(150, 255, 150, 0.3)';
        } catch (err) {
          console.error('Failed to reload pattern:', err);
          reloadBtn.style.background = 'rgba(255, 150, 150, 0.3)';
        }
        
        setTimeout(() => {
          reloadBtn.style.background = 'rgba(180, 130, 255, 0.15)';
        }, 500);
      });

      // Initialize
      async function init() {
        // Set initial display values
        angleDisplay.textContent = '0.0°';
        speedDisplay.textContent = '0.60x';
        
        // Generate initial pattern
        try {
          patternCanvas = await drawSpiralPattern();
          patternReady = true;
        } catch (err) {
          console.error('Failed to generate pattern:', err);
        }
        
        // Start animation
        lastTime = performance.now();
        animationId = requestAnimationFrame(animate);
        
        // Initial render
        render();
      }

      // Start when p5 is loaded
      if (typeof p5 !== 'undefined') {
        init();
      } else {
        window.addEventListener('load', init);
      }

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (animationId) {
          cancelAnimationFrame(animationId);
        }
      });
    })();
  </script>
</body>
</html>
