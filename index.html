<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PNG rotation · center slider · speed control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 3rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: fit-content;
      max-width: 95vw;
    }

    .canvas-wrapper {
      background: rgba(10, 10, 20, 0.5);
      border-radius: 2.5rem;
      padding: 1.2rem;
      box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.6), 0 18px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 1.8rem;
      background: transparent;
      transition: filter 0.2s ease;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      color: #f0eef8;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .label-row span:first-child {
      font-size: 1rem;
      text-transform: uppercase;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .value-badge {
      background: rgba(255, 255, 255, 0.15);
      padding: 0.25rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      color: #ffecaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #7f7fd5, #86a8e7, #91eae4);
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(120, 140, 255, 0.7);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 18px #c4b5fd, 0 4px 10px black;
      border: 2px solid #ffffffdd;
      transition: 0.15s;
      cursor: pointer;
      margin-top: -7px;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      background: #f8f8ff;
    }

    .speed-slider {
      background: linear-gradient(to right, #2b2b4a, #5b5b9a, #b8b8ff);
    }

    .note {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.4rem;
      border-radius: 2.5rem;
      color: white;
      font-weight: 500;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.9rem;
      align-self: center;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 18px rgba(180, 180, 255, 0.6);
    }

    @media (max-width: 550px) {
      .card {
        padding: 1.8rem;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="canvas-wrapper">
      <canvas id="imageCanvas" aria-label="Rotating PNG image from my.png"></canvas>
    </div>

    <div class="control-panel">
      <!-- Rotation angle slider -->
      <div class="slider-group">
        <div class="label-row">
          <span>🔄 Rotation angle</span>
          <span class="value-badge" id="angleDisplay">0°</span>
        </div>
        <input type="range" id="angleSlider" min="0" max="360" value="0" step="0.1" aria-label="Rotation angle in degrees">
        <div class="note">0° = upright · continuous rotation</div>
      </div>

      <!-- Speed slider (0 = stopped, left is 0) -->
      <div class="slider-group">
        <div class="label-row">
          <span>⚡ Rotation speed</span>
          <span class="value-badge" id="speedDisplay">0.0x</span>
        </div>
        <input type="range" id="speedSlider" min="0" max="3" value="0.6" step="0.01" class="speed-slider" aria-label="Rotation speed multiplier">
        <div class="note">0 = stopped · leftmost · drag right for faster</div>
      </div>

      <button id="resetButton">
        <span>↺</span> Reset angle (0°)
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ----- DOM elements -----
      const canvas = document.getElementById('imageCanvas');
      const ctx = canvas.getContext('2d');

      const angleSlider = document.getElementById('angleSlider');
      const speedSlider = document.getElementById('speedSlider');
      const angleDisplay = document.getElementById('angleDisplay');
      const speedDisplay = document.getElementById('speedDisplay');
      const resetBtn = document.getElementById('resetButton');

      // ----- Image & state -----
      let image = null;
      let currentAngle = 0.0;          // in degrees
      let rotationSpeed = 0.6;        // default speed (degrees per frame ~ scaled)
      
      // Animation & timing
      let animationFrameId = null;
      let lastTimestamp = 0;
      
      // Canvas dimensions (will be set based on image natural size, but constrained)
      const MAX_CANVAS_WIDTH = 520;
      const MAX_CANVAS_HEIGHT = 520;

      // ----- Load the PNG image -----
      function loadImage() {
        image = new Image();
        // The PNG file must be in the same directory as this HTML file.
        image.src = 'my.png';
        
        image.onload = () => {
          // Set canvas dimensions respecting max size but keeping aspect ratio
          const naturalWidth = image.naturalWidth;
          const naturalHeight = image.naturalHeight;
          
          let drawWidth = naturalWidth;
          let drawHeight = naturalHeight;
          
          if (naturalWidth > MAX_CANVAS_WIDTH || naturalHeight > MAX_CANVAS_HEIGHT) {
            const widthRatio = MAX_CANVAS_WIDTH / naturalWidth;
            const heightRatio = MAX_CANVAS_HEIGHT / naturalHeight;
            const ratio = Math.min(widthRatio, heightRatio);
            drawWidth = Math.floor(naturalWidth * ratio);
            drawHeight = Math.floor(naturalHeight * ratio);
          }
          
          canvas.width = drawWidth;
          canvas.height = drawHeight;
          
          // Initialize angle from slider (0)
          currentAngle = parseFloat(angleSlider.value);
          // Draw first frame
          drawImageRotated();
          
          // Start animation loop if not already running
          if (animationFrameId === null) {
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(animationLoop);
          }
        };
        
        image.onerror = () => {
          console.warn('my.png could not be loaded. Make sure it exists in the same folder.');
          // Draw a placeholder message on canvas
          canvas.width = 400;
          canvas.height = 260;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#2a2a4a';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = '16px "Segoe UI", Roboto';
          ctx.fillStyle = '#ddddff';
          ctx.textAlign = 'center';
          ctx.fillText('🖼️ my.png not found', canvas.width/2, canvas.height/2 - 10);
          ctx.fillText('Place image in same directory', canvas.width/2, canvas.height/2 + 30);
          
          // Still allow UI to work, but animation will skip draw
          if (animationFrameId === null) {
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(animationLoop);
          }
        };
      }

      // ----- Drawing function: rotates image around its center -----
      function drawImageRotated() {
        if (!canvas || !ctx) return;
        
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // If image not loaded or broken, draw nothing (or keep placeholder)
        if (!image || !image.complete || image.naturalWidth === 0) {
          // Optionally draw subtle background
          ctx.fillStyle = '#1e1e30';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = '14px "Segoe UI"';
          ctx.fillStyle = '#aaa';
          ctx.textAlign = 'center';
          ctx.fillText('⏳ loading image...', canvas.width/2, canvas.height/2);
          return;
        }
        
        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;
        
        // Save context and apply rotation around canvas center
        ctx.save();
        ctx.translate(centerX, centerY);
        
        // Convert current angle to radians
        const angleRad = (currentAngle * Math.PI) / 180;
        ctx.rotate(angleRad);
        
        // Draw image centered: we draw from -imgDrawWidth/2, -imgDrawHeight/2
        // The image draw size matches canvas dimensions (already scaled to fit)
        ctx.drawImage(
          image,
          -w / 2,
          -h / 2,
          w,
          h
        );
        
        ctx.restore();
      }

      // ----- Animation loop: updates angle based on speed and time -----
      function animationLoop(timestamp) {
        if (lastTimestamp === 0) {
          lastTimestamp = timestamp;
          animationFrameId = requestAnimationFrame(animationLoop);
          drawImageRotated();
          return;
        }
        
        // Calculate delta time in seconds
        const deltaTime = Math.min(0.1, (timestamp - lastTimestamp) / 1000); // cap to avoid large jumps
        lastTimestamp = timestamp;
        
        // Update angle based on rotation speed (degrees per second)
        // speed slider value is interpreted as degrees per second factor.
        // Example: speed = 1.0 means 60 degrees per second? We'll use a multiplier.
        // Let's make speed represent "factor * 60 degrees per second" for intuitive feel.
        // Actually simpler: speed value = degrees per frame? No, use time-based.
        // Define base speed: speed = 1.0 -> 90 degrees per second (smooth)
        const DEGREES_PER_SECOND_AT_SPEED_1 = 90.0;
        
        if (rotationSpeed > 0.001) {
          // Increase angle continuously
          currentAngle += rotationSpeed * DEGREES_PER_SECOND_AT_SPEED_1 * deltaTime;
          // Normalize angle to [0, 360) range for display and consistency
          currentAngle = currentAngle % 360;
          if (currentAngle < 0) currentAngle += 360;
          
          // Update the angle slider to reflect the changing angle (without triggering re-draw loop)
          // Use programmatic update without dispatching 'input' event to avoid recursion.
          angleSlider.value = currentAngle;
          // Update display
          angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        }
        
        // Always redraw
        drawImageRotated();
        
        // Continue animation
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      // ----- Sync UI sliders to state -----
      function updateAngleFromSlider() {
        const newAngle = parseFloat(angleSlider.value);
        if (isNaN(newAngle)) return;
        currentAngle = newAngle;
        angleDisplay.textContent = currentAngle.toFixed(1) + '°';
        // No need to call drawImageRotated here because animation loop will draw on next frame.
        // But for immediate responsiveness when dragging while speed=0, we could draw instantly.
        // We'll draw immediately to avoid lag when stopped.
        if (Math.abs(rotationSpeed) < 0.001) {
          drawImageRotated();
        }
      }

      function updateSpeedFromSlider() {
        const newSpeed = parseFloat(speedSlider.value);
        if (isNaN(newSpeed)) return;
        rotationSpeed = newSpeed;
        speedDisplay.textContent = rotationSpeed.toFixed(2) + 'x';
        
        // If speed becomes 0 (or very small), we might want to stop animation? 
        // Animation continues but angle won't change. That's fine.
      }

      // Reset angle to 0
      function resetAngle() {
        currentAngle = 0.0;
        angleSlider.value = 0.0;
        angleDisplay.textContent = '0.0°';
        // If speed is 0, draw immediately; otherwise animation loop picks up.
        if (Math.abs(rotationSpeed) < 0.001) {
          drawImageRotated();
        }
      }

      // ----- Event listeners -----
      angleSlider.addEventListener('input', updateAngleFromSlider);
      
      speedSlider.addEventListener('input', updateSpeedFromSlider);
      
      resetBtn.addEventListener('click', resetAngle);

      // Also handle case when user manually changes angle while speed > 0:
      // The animation loop continuously updates currentAngle based on speed.
      // If user drags angle slider while speed > 0, the animation will overwrite it next frame.
      // To make manual angle adjustment "stick" temporarily, we could pause speed? 
      // Better: when user interacts with angle slider, we set the angle and optionally set speed to 0?
      // The prompt doesn't specify that. We'll keep it as is: manual angle change will be overridden 
      // by continuous rotation if speed > 0. That's expected behavior (speed rotates it).
      // But we can add a small UX: if user drags angle slider, we could temporarily set speed to 0?
      // Let's not override speed automatically; user can set speed to 0 to manually control angle.
      // Add an additional hint: when angle slider is changed, we still set currentAngle.
      // However animation loop recalculates based on speed. To prevent conflict, we 
      // could pause speed when angle slider is actively used? That might be confusing.
      // We'll keep it straightforward: speed rotates continuously; angle slider shows current angle.
      
      // For better manual control: if user changes angle slider while speed > 0, we could
      // optionally set speed to 0? Many demos do that. Let's implement a subtle behavior:
      // When user manually adjusts angle slider (via input), we set speed to 0 so they can 
      // freely position the image. This matches expectation: "I want to rotate manually".
      // We'll add that as an intuitive feature.
      angleSlider.addEventListener('input', () => {
        // When user manually drags angle slider, stop automatic rotation.
        if (rotationSpeed > 0.001) {
          rotationSpeed = 0.0;
          speedSlider.value = 0.0;
          speedDisplay.textContent = '0.00x';
        }
        updateAngleFromSlider();
      });

      // Also allow speed slider to resume rotation naturally.
      
      // Initialize displays with current slider values
      function initializeDisplays() {
        angleDisplay.textContent = parseFloat(angleSlider.value).toFixed(1) + '°';
        speedDisplay.textContent = parseFloat(speedSlider.value).toFixed(2) + 'x';
        rotationSpeed = parseFloat(speedSlider.value);
        currentAngle = parseFloat(angleSlider.value);
      }
      
      // Set initial values
      initializeDisplays();
      
      // Start loading the image
      loadImage();

      // Cleanup animation on page unload (optional but good practice)
      window.addEventListener('beforeunload', () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      });

    })();
  </script>
</body>
</html>
