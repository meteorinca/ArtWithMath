<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rotating spiral · p5.js sliders</title>
  <style>
    body {
      margin: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }
    canvas {
      display: block;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
    }
    .control-panel {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 1.2rem 2.5rem;
      border-radius: 50px;
      display: flex;
      gap: 2.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #e0e0e0;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .slider-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.05);
      padding: 0.4rem 1rem;
      border-radius: 30px;
    }
    input[type="range"] {
      width: 130px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      height: 5px;
      border-radius: 5px;
      accent-color: #ffb56b;
    }
    .value-display {
      min-width: 55px;
      display: inline-block;
      background: rgba(0,0,0,0.4);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: #ffd7a5;
      font-weight: 600;
    }
    @media (max-width: 700px) {
      .control-panel {
        flex-direction: column;
        gap: 1.2rem;
        padding: 1.2rem 2rem;
      }
    }
  </style>
  <!-- p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <!-- p5 canvas will be placed here automatically -->
  <div class="control-panel">
    <div class="slider-group">
      <label>
        <span style="font-size:1.2rem;">↻</span> Rotation
        <input type="range" id="rotationSlider" min="0" max="360" value="0" step="0.1">
        <span class="value-display" id="rotationValue">0.0°</span>
      </label>
    </div>
    <div class="slider-group">
      <label>
        <span style="font-size:1.2rem;">⚡</span> Speed
        <input type="range" id="speedSlider" min="0" max="2.5" value="0.5" step="0.01">
        <span class="value-display" id="speedValue">0.50</span>
      </label>
    </div>
  </div>

  <script>
    // ------------------------------------------------------------
    // Global rotation state – shared between UI and p5 sketch
    // ------------------------------------------------------------
    let rotationAngle = 0;          // current cumulative rotation (radians)
    let rotationSpeed = 0.5;       // radians per second (controlled by speed slider)

    // DOM elements for sliders & displays
    const rotationSlider = document.getElementById('rotationSlider');
    const rotationValue = document.getElementById('rotationValue');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');

    // Initialize from sliders
    rotationAngle = radians(parseFloat(rotationSlider.value));
    rotationSpeed = parseFloat(speedSlider.value);
    
    // Update displays
    rotationValue.textContent = parseFloat(rotationSlider.value).toFixed(1) + '°';
    speedValue.textContent = rotationSpeed.toFixed(2);

    // --- Event listeners: manual rotation adjustment ---
    rotationSlider.addEventListener('input', (e) => {
      const deg = parseFloat(e.target.value);
      rotationAngle = radians(deg);
      rotationValue.textContent = deg.toFixed(1) + '°';
      // Redraw once if p5 is ready (but animation loop will handle continuous update)
      if (window.redrawSpiral) window.redrawSpiral();
    });

    // --- Speed slider changes rotationSpeed ---
    speedSlider.addEventListener('input', (e) => {
      rotationSpeed = parseFloat(e.target.value);
      speedValue.textContent = rotationSpeed.toFixed(2);
    });

    // ------------------------------------------------------------
    // p5.js sketch – wraps your sample.js logic with rotation
    // ------------------------------------------------------------
    new p5((p) => {

      // We'll store the original drawing logic but add rotation transform.
      // The draw function will be called continuously because we use a loop.

      p.setup = function() {
        const canvas = p.createCanvas(900, 900);
        canvas.parent(document.body); // place canvas before control panel? 
        // Actually we want canvas then panel. p5 appends canvas to body by default.
        // We'll move the control panel after canvas using a small trick.
        const panel = document.querySelector('.control-panel');
        if (panel) {
          // Ensure canvas is placed before the panel in DOM
          const body = document.body;
          body.insertBefore(canvas.elt, panel);
        }
        
        // No loop in original, but we need continuous animation for speed.
        p.loop();
        
        // Expose a redraw trigger (though loop does it automatically)
        window.redrawSpiral = () => p.redraw();
      };

      p.draw = function() {
        // --- accumulate rotation based on speed and delta time ---
        // deltaTime is in milliseconds, convert to seconds
        let dt = p.deltaTime / 1000;
        // clamp to avoid jumps when tab inactive (optional)
        if (dt > 0.1) dt = 0.016; 
        
        // Update rotation angle continuously using speed
        rotationAngle += rotationSpeed * dt;
        
        // Keep angle within 0..TWO_PI for slider sync, but not strictly necessary.
        // Normalize for display consistency.
        rotationAngle = rotationAngle % p.TWO_PI;
        
        // Update rotation slider to reflect current angle (in degrees)
        const currentDeg = p.degrees(rotationAngle) % 360;
        // Avoid updating slider if user is currently dragging it (to prevent fight)
        if (document.activeElement !== rotationSlider) {
          rotationSlider.value = currentDeg.toFixed(1);
          rotationValue.textContent = currentDeg.toFixed(1) + '°';
        }

        // --- Now draw the spiral with the current rotation applied ---
        p.background(20);
        
        p.push();
        // Translate to center and apply the cumulative rotation
        p.translate(p.width / 2, p.height / 2);
        p.rotate(rotationAngle);
        
        // ----- original spiral drawing (from sample.js, adapted) -----
        const R = 405;
        
        // outer circle
        p.noFill();
        p.stroke(255);
        p.strokeWeight(1.2);
        p.ellipse(0, 0, 2 * R);
        
        // clip dots to circle using drawingContext
        p.drawingContext.save();
        p.drawingContext.beginPath();
        p.drawingContext.arc(0, 0, R - 1.5, 0, p.TWO_PI);
        p.drawingContext.clip();
        
        p.noStroke();
        p.fill(255);
        
        // main controls (same as sample.js)
        const K = 68;
        const r0 = 0.0105;
        const growth = 0.053;
        const ringTwist = 0.132;
        const tight = 10.85;
        const phase0 = 0.72;
        const arms = 2;
        
        for (let j = 0; ; j++) {
          const nr = r0 * Math.exp(growth * j);
          if (nr > 0.995) break;
          
          const r = nr * R;
          
          for (let k = 0; k < K; k++) {
            const theta = p.TWO_PI * k / K + j * ringTwist;
            
            const p_phase = arms * theta + tight * Math.log(nr) + phase0;
            const wave = 0.5 + 0.5 * Math.cos(p_phase);
            
            const sharp = 1.7 + 1.4 * (1.0 - nr);
            const band = Math.pow(wave, sharp);
            
            const baseSize = 0.45 + 6.9 * Math.pow(nr, 0.92);
            const armBoost = 20.8 * Math.pow(nr, 1.06) * band;
            const d = baseSize + armBoost;
            
            const x = r * Math.cos(theta);
            const y = r * Math.sin(theta);
            
            if (r + d * 0.52 > R - 1.5) continue;
            
            p.ellipse(x, y, d);
          }
        }
        
        p.drawingContext.restore();
        
        // redraw circle border on top
        p.noFill();
        p.stroke(255);
        p.strokeWeight(1.2);
        p.ellipse(0, 0, 2 * R);
        
        p.pop();
        // ----- end spiral drawing -----
      };

      // Optional: handle window resize if needed, but fixed canvas size.
    });
  </script>
</body>
</html>
