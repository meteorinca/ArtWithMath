<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spiral – Rotation Speed & Offset</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: system-ui, 'Segoe UI', monospace;
      overflow: hidden;
    }

    /* Canvas container – full screen, centered */
    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    canvas {
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 10px 25px rgba(0,0,0,0.5);
      border-radius: 12px;
      max-width: 95vmin;
      max-height: 95vmin;
      width: auto;
      height: auto;
    }

    /* Slider panel */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 100;
      font-weight: 500;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .control-group label {
      color: #eee;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    input {
      width: 260px;
      cursor: pointer;
      background: #222;
      height: 4px;
      border-radius: 5px;
      accent-color: #ffaa44;
    }

    .value-display {
      color: #ffaa66;
      font-family: monospace;
      font-size: 14px;
      background: #1e1e2a;
      padding: 4px 12px;
      border-radius: 20px;
      min-width: 70px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .controls { flex-direction: column; align-items: stretch; bottom: 12px; left: 12px; right: 12px; padding: 12px; gap: 12px; }
      .control-group { justify-content: space-between; }
      input { width: 180px; }
    }

    .info {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      color: #ccc;
      font-family: monospace;
      backdrop-filter: blur(4px);
      pointer-events: none;
      z-index: 100;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <!-- Load the pattern file (refactored) -->
  <script src="sample.js"></script>
</head>
<body>
<div class="canvas-container" id="canvasContainer"></div>

<div class="controls">
  <div class="control-group">
    <label>🔁 Manual rotation</label>
    <input type="range" id="rotateSlider" min="0" max="360" step="0.1" value="0">
    <span id="rotateVal" class="value-display">0°</span>
  </div>
  <div class="control-group">
    <label>⚡ Rotation speed</label>
    <input type="range" id="speedSlider" min="0" max="180" step="1" value="0">
    <span id="speedVal" class="value-display">0 °/s</span>
  </div>
</div>
<div class="info">spiral | two sliders | editable sample.js</div>

<script>
  // -------- animation & sliders --------
  let manualAngleDeg = 0;      // degrees from slider
  let rotationSpeedDegPerSec = 0;
  let autoAngleDeg = 0;        // accumulates over time (seconds)
  let lastTimestamp = 0;

  const container = document.getElementById('canvasContainer');

  // Setup p5 sketch (instance mode to avoid global conflicts)
  new p5((p) => {
    p.setup = function() {
      // Create a canvas that fits nicely (square, but will be sized via CSS)
      let sz = min(p.windowWidth * 0.92, p.windowHeight * 0.92, 900);
      let canvas = p.createCanvas(900, 900);
      canvas.parent(container);
      p.frameRate(60);
      p.noLoop();            // we'll manually redraw on slider change or animation frame
      lastTimestamp = p.millis() / 1000;
    };

    // Draw the scene: background, translate, call drawSpiral
    function redrawSpiral() {
      p.background(20);
      p.push();
      p.translate(p.width / 2, p.height / 2);
      // total rotation = manual offset (radians) + accumulated auto rotation
      let totalRad = p.radians(manualAngleDeg) + autoAngleDeg;
      drawSpiral(totalRad);
      p.pop();
    }

    // Update auto rotation based on time delta
    function updateAutoRotation(nowSec) {
      if (rotationSpeedDegPerSec === 0) return;
      let delta = nowSec - lastTimestamp;
      if (delta > 0.05) delta = 0.05; // clamp
      let angleInc = p.radians(rotationSpeedDegPerSec * delta);
      autoAngleDeg += angleInc;
      // keep autoAngle in reasonable range (optional)
      autoAngleDeg = autoAngleDeg % p.TWO_PI;
    }

    // Redraw whenever needed (slider or animation frame)
    p.draw = function() {
      let now = p.millis() / 1000;
      if (rotationSpeedDegPerSec !== 0) {
        updateAutoRotation(now);
        redrawSpiral();
      }
      lastTimestamp = now;
    };

    // Manual redraw when sliders change and speed = 0
    function requestRedraw() {
      if (rotationSpeedDegPerSec === 0) {
        redrawSpiral();
      }
    }

    // ----- bind HTML sliders -----
    const rotateSlider = document.getElementById('rotateSlider');
    const rotateVal = document.getElementById('rotateVal');
    const speedSlider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');

    rotateSlider.addEventListener('input', (e) => {
      manualAngleDeg = parseFloat(e.target.value);
      rotateVal.innerText = manualAngleDeg.toFixed(1) + '°';
      if (rotationSpeedDegPerSec === 0) redrawSpiral();
      else {
        // if speed > 0, we still redraw now to show immediate manual offset
        redrawSpiral();
      }
    });

    speedSlider.addEventListener('input', (e) => {
      rotationSpeedDegPerSec = parseFloat(e.target.value);
      speedVal.innerText = rotationSpeedDegPerSec.toFixed(0) + ' °/s';
      if (rotationSpeedDegPerSec === 0) {
        // stop auto accumulation, just redraw current state
        redrawSpiral();
      }
      // when speed > 0, p.draw() will automatically keep updating.
    });

    // initial draw
    p.windowResized = function() {
      // canvas size stays 900, but CSS handles scaling.
      redrawSpiral();
    };

    // start the loop only if speed > 0, but we need to check regularly.
    // we'll let draw run always, but we only update and redraw if speed != 0.
    // For performance, when speed=0 we still call draw once? Actually p.draw runs continuously,
    // but we can early return. Better to use looping only when needed.
    // However the current implementation: draw runs every frame, checks speed, updates if needed.
    // That's fine (~60 fps idle is okay).
    // Ensure first draw
    redrawSpiral();
  });
</script>
</body>
</html>
