<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spiral</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: system-ui, 'Segoe UI', monospace;
      overflow: hidden;
    }

    /* Canvas container – full screen, centered */
    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    canvas {
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 10px 25px rgba(0,0,0,0.5);
      border-radius: 12px;
      max-width: 95vmin;
      max-height: 95vmin;
      width: auto;
      height: auto;
    }

    /* Slider panel */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 100;
      font-weight: 500;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .control-group label {
      color: #eee;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    input {
      width: 260px;
      cursor: pointer;
      background: #222;
      height: 4px;
      border-radius: 5px;
      accent-color: #ffaa44;
    }

    .value-display {
      color: #ffaa66;
      font-family: monospace;
      font-size: 14px;
      background: #1e1e2a;
      padding: 4px 12px;
      border-radius: 20px;
      min-width: 70px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .controls { flex-direction: column; align-items: stretch; bottom: 12px; left: 12px; right: 12px; padding: 12px; gap: 12px; }
      .control-group { justify-content: space-between; }
      input { width: 180px; }
    }

    .info {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      color: #ccc;
      font-family: monospace;
      backdrop-filter: blur(4px);
      pointer-events: none;
      z-index: 100;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <!-- Load the pattern file (must contain drawSpiral function) -->
  <script src="sample.js"></script>
</head>
<body>
<div class="canvas-container" id="canvasContainer"></div>

<div class="controls">
  <div class="control-group">
    <label>🔁 Manual rotation</label>
    <input type="range" id="rotateSlider" min="0" max="360" step="0.1" value="0">
    <span id="rotateVal" class="value-display">0°</span>
  </div>
  <div class="control-group">
    <label>⚡ Rotation speed</label>
    <input type="range" id="speedSlider" min="0" max="180" step="1" value="0">
    <span id="speedVal" class="value-display">0 °/s</span>
  </div>
</div>
<div class="info">spiral that spirals</div>

<script>
  // --- Global p5 variables ---
  let canvas;
  let manualAngleDeg = 0;          // from slider (degrees)
  let autoAngleRad = 0;            // accumulated auto rotation (radians)
  let rotationSpeedDegPerSec = 0;  // from speed slider
  let lastTimestamp = 0;

  function setup() {
    // Create a fixed 900x900 canvas, attach to container
    canvas = createCanvas(900, 900);
    canvas.parent('canvasContainer');
    frameRate(60);
    lastTimestamp = millis() / 1000;
    
    // Initial draw
    redrawSpiral();
  }

  // Redraws the whole scene using current angles
  function redrawSpiral() {
    background(20);
    push();
    translate(width / 2, height / 2);
    let totalRad = radians(manualAngleDeg) + autoAngleRad;
    drawSpiral(totalRad);
    pop();
  }

  // Update auto rotation based on elapsed time
  function updateAutoRotation(nowSec) {
    if (rotationSpeedDegPerSec === 0) return;
    let delta = nowSec - lastTimestamp;
    if (delta > 0.05) delta = 0.05; // safety clamp
    let angleInc = radians(rotationSpeedDegPerSec * delta);
    autoAngleRad += angleInc;
    // keep within range (optional, doesn't affect drawing)
    autoAngleRad = autoAngleRad % TWO_PI;
  }

  function draw() {
    let now = millis() / 1000;
    if (rotationSpeedDegPerSec !== 0) {
      updateAutoRotation(now);
      redrawSpiral();
    }
    lastTimestamp = now;
  }

  // --- HTML slider bindings ---
  const rotateSlider = document.getElementById('rotateSlider');
  const rotateVal = document.getElementById('rotateVal');
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');

  rotateSlider.addEventListener('input', (e) => {
    manualAngleDeg = parseFloat(e.target.value);
    rotateVal.innerText = manualAngleDeg.toFixed(1) + '°';
    if (rotationSpeedDegPerSec === 0) {
      redrawSpiral();   // immediate redraw when speed = 0
    } else {
      redrawSpiral();   // also update immediately to show manual offset even while rotating
    }
  });

  speedSlider.addEventListener('input', (e) => {
    rotationSpeedDegPerSec = parseFloat(e.target.value);
    speedVal.innerText = rotationSpeedDegPerSec.toFixed(0) + ' °/s';
    if (rotationSpeedDegPerSec === 0) {
      // stop auto rotation accumulation, but keep current autoAngleRad
      redrawSpiral();
    }
  });

  // Redraw on window resize (CSS handles scaling, but canvas remains 900x900)
  function windowResized() {
    // No need to resize canvas, just redraw to ensure correct positioning
    redrawSpiral();
  }
</script>
</body>
</html>
